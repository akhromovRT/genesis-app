name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image name lowercase
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: GH_TOKEN,IMAGE
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail
            echo "$GH_TOKEN" | docker login ghcr.io -u akhromovrt --password-stdin
            docker pull "$IMAGE:latest"

            # ── Apply pending DB migrations BEFORE restarting the app ──
            # Извлекаем drizzle/*.sql из свежего образа и прогоняем psql-ом
            # под тем же DATABASE_URL, что и приложение. ALTER ADD COLUMN
            # IF NOT EXISTS + INSERT ON CONFLICT делают это идемпотентным.
            # Старый контейнер ещё крутится — если миграции упадут,
            # деплой завершится с ошибкой, но прод не сломан.
            echo "=== Applying DB migrations ==="
            # psql запускаем ВНУТРИ контейнера pass24-postgres — там же есть
            # сам psql + hostname "pass24-postgres" резолвится в localhost
            # контейнера. С VPS-хоста это имя не резолвится (docker-network),
            # поэтому хостовой psql не подходит.
            PG_CONTAINER=pass24-postgres
            if ! docker ps --format '{{.Names}}' | grep -qx "$PG_CONTAINER"; then
              echo "ERROR: container $PG_CONTAINER not running" >&2
              exit 1
            fi
            ENV_FILE=/opt/sites/genesis-app/.env
            if [ ! -f "$ENV_FILE" ]; then
              echo "ERROR: $ENV_FILE not found; cannot read DATABASE_URL" >&2
              exit 1
            fi
            set -a
            # shellcheck disable=SC1090
            . "$ENV_FILE"
            set +a
            if [ -z "${DATABASE_URL:-}" ]; then
              echo "ERROR: DATABASE_URL not set in $ENV_FILE" >&2
              exit 1
            fi
            TMPDIR=$(mktemp -d)
            trap 'rm -rf "$TMPDIR"' EXIT
            CID=$(docker create "$IMAGE:latest")
            docker cp "$CID":/app/drizzle "$TMPDIR/drizzle"
            docker rm "$CID" >/dev/null

            # Tracking table — что уже применено, чтобы не запускать 0001-0004
            # повторно (они не идемпотентны: CREATE TRIGGER без IF NOT EXISTS).
            docker exec "$PG_CONTAINER" psql "$DATABASE_URL" -v ON_ERROR_STOP=on -c \
              "CREATE TABLE IF NOT EXISTS schema_migrations (filename text PRIMARY KEY, applied_at timestamptz NOT NULL DEFAULT now())" >/dev/null

            # Bootstrap: если public.tests уже существует — значит первичная
            # схема была применена руками до этого механизма. Помечаем
            # 0001-0004 как применённые (ON CONFLICT DO NOTHING делает
            # это безопасным повторно).
            # NB: postgres (bool)::text печатает full word — 'true'/'false'.
            HAS_TESTS=$(docker exec "$PG_CONTAINER" psql "$DATABASE_URL" -tAXc \
              "SELECT (to_regclass('public.tests') IS NOT NULL)::text" | tr -d '[:space:]')
            if [ "$HAS_TESTS" = "true" ]; then
              echo "Pre-existing schema detected; marking 0001-0004 as applied"
              docker exec "$PG_CONTAINER" psql "$DATABASE_URL" -v ON_ERROR_STOP=on -c \
                "INSERT INTO schema_migrations (filename) VALUES ('0001_init.sql'),('0002_dna_tables.sql'),('0003_questionnaire.sql'),('0004_early_access_leads.sql') ON CONFLICT DO NOTHING" >/dev/null
            fi

            for f in $(ls -1 "$TMPDIR"/drizzle/*.sql 2>/dev/null | sort); do
              fname=$(basename "$f")
              applied=$(docker exec "$PG_CONTAINER" psql "$DATABASE_URL" -tAXc \
                "SELECT 1 FROM schema_migrations WHERE filename = '$fname'" | tr -d '[:space:]')
              if [ "$applied" = "1" ]; then
                echo "Skipping $fname (already applied)"
                continue
              fi
              echo "Applying $fname"
              docker exec -i "$PG_CONTAINER" psql "$DATABASE_URL" -v ON_ERROR_STOP=on < "$f"
              docker exec "$PG_CONTAINER" psql "$DATABASE_URL" -c \
                "INSERT INTO schema_migrations (filename) VALUES ('$fname') ON CONFLICT DO NOTHING" >/dev/null
            done
            echo "=== Migrations done ==="

            docker compose -f /opt/sites/genesis-app/docker-compose.yml up -d --remove-orphans --force-recreate
            docker image prune -f
            echo "Deploy finished OK"
